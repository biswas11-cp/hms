<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments Management</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #024902, #010610);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: rgb(199, 221, 241);
            margin-bottom: 20px;
        }

        h2 {
            color: rgb(199, 221, 241);
            margin-top: 30px;
        }
        button {
            margin: 5px 5px 5px 0;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button[type="submit"] {
            background-color: #28a745;
            color: white;
        }

        button:not([type="submit"]) {
            background-color: #1dba25;
            color: rgb(16, 3, 3);
        }
        #addAppointmentForm {
            margin-top: 20px;
            padding: 25px;
            border-radius: 12px;
            background: rgb(140, 136, 136);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 450px;
        }

        #addAppointmentForm h3 {
            margin-bottom: 15px;
            color: #000104;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 8px 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2f0411;
            box-shadow: 0 0 5px rgba(169, 193, 235, 0.682);
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        table, th, td {
            border: none;
        }

        th {
            background: #010205;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f4f8ff;
        }
        @media (max-width: 768px) {

            body {
                padding: 10px;
            }

            #addAppointmentForm {
                max-width: 100%;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                background: white;
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }

            td {
                border: none;
                position: relative;
                padding-left: 50%;
                margin-bottom: 8px;
            }

            td::before {
                position: absolute;
                left: 10px;
                top: 8px;
                font-weight: bold;
                color: #2a5298;
            }

            td:nth-of-type(1)::before { content: "ID"; }
            td:nth-of-type(2)::before { content: "Patient"; }
            td:nth-of-type(3)::before { content: "Doctor"; }
            td:nth-of-type(4)::before { content: "Date"; }
            td:nth-of-type(5)::before { content: "Status"; }
            td:nth-of-type(6)::before { content: "Update"; }
            td:nth-of-type(7)::before { content: "Delete"; }
        }

    </style>
</head>
<body>

<h1>Appointments Management</h1>

<button onclick="window.location.href='index.html'">Home</button>

<div id="addAppointmentForm">
    <h3>Appointment Form</h3>
    <form id="appointmentForm">

        <label>Patient ID:</label>
        <input type="number" id="patientId" required>

        <label>Doctor ID:</label>
        <input type="number" id="doctorId" required>

        <label>Date:</label>
        <input type="date" id="appointmentDate" required>

        <label>Status:</label>
        <select id="status" required>
            <option value="Scheduled">Scheduled</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
        </select><br><br>

        <button type="submit" id="submitBtn">Add Appointment</button>

    </form>
</div>

<h2>All Appointments</h2>

<table id="appointmentsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Status</th>
        <th>Update</th>
        <th>Delete</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="js/appointments.js"></script>
</body>
</html>
