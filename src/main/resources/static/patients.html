<!DOCTYPE html>
<html>
<head>
    <title>Patients Management</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        h2 {
            color: white;
            margin-top: 30px;
        }
        button {
            padding: 7px 14px;
            margin: 5px 5px 5px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button[type="submit"] {
            background-color: #28a745;
            color: white;
        }

        button[type="button"] {
            background-color: #dc3545;
            color: white;
        }

        button:not([type]) {
            background-color: #007bff;
            color: white;
        }
        #patientFormDiv {
            display: none;
            margin-top: 20px;
            padding: 25px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        #formTitle {
            margin-bottom: 15px;
            color: #1f4037;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1f4037;
            box-shadow: 0 0 5px rgba(31,64,55,0.4);
        }


        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        th {
            background: #1f4037;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f2fffa;
        }


        @media (max-width: 768px) {

            body {
                padding: 10px;
            }

            #patientFormDiv {
                max-width: 100%;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                background: white;
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }

            td {
                border: none;
                position: relative;
                padding-left: 50%;
                margin-bottom: 8px;
            }

            td::before {
                position: absolute;
                left: 10px;
                top: 8px;
                font-weight: bold;
                color: #1f4037;
            }

            td:nth-of-type(1)::before { content: "ID"; }
            td:nth-of-type(2)::before { content: "Name"; }
            td:nth-of-type(3)::before { content: "Age"; }
            td:nth-of-type(4)::before { content: "Disease"; }
            td:nth-of-type(5)::before { content: "Doctor Name"; }
            td:nth-of-type(6)::before { content: "Update"; }
            td:nth-of-type(7)::before { content: "Delete"; }
        }

    </style>
</head>
<body>

<h1>Patients Management</h1>

<button onclick="window.location.href='index.html'">Home</button>
<button onclick="showForm()">Add Patient</button>
<div id="patientFormDiv">
    <h3 id="formTitle">Add Patient</h3>

    <form id="patientForm">

        <label>Name:</label>
        <input type="text" id="patientName" required>

        <label>Age:</label>
        <input type="number" id="patientAge" required>

        <label>Disease:</label>
        <input type="text" id="patientDisease">

        <label>Doctor Name:</label>
        <input type="text" id="patientDoctorName">

        <br>
        <button type="submit">Save</button>
        <button type="button" onclick="hideForm()">Cancel</button>

    </form>
</div>

<h2>All Patients</h2>

<table id="patientsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Disease</th>
        <th>Doctor Name</th>
        <th>Update</th>
        <th>Delete</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="js/patients.js"></script>

</body>
</html>
