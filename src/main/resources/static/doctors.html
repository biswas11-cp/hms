<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors Management</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        h2 {
            color: white;
            margin-top: 30px;
        }
        button {
            padding: 8px 16px;
            margin: 5px 5px 5px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button[type="submit"] {
            background-color: #28a745;
            color: white;
        }

        button[type="button"] {
            background-color: #dc3545;
            color: white;
        }

        button:not([type]) {
            background-color: #007bff;
            color: white;
        }
        #doctorFormDiv {
            margin-top: 20px;
            padding: 25px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        #formTitle {
            margin-bottom: 15px;
            color: #2c5364;
        }

        label {
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #2c5364;
            box-shadow: 0 0 5px rgba(44,83,100,0.4);
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        th {
            background: #2c5364;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f4f9ff;
        }
        @media (max-width: 768px) {

            body {
                padding: 10px;
            }

            #doctorFormDiv {
                max-width: 100%;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                background: white;
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }

            td {
                border: none;
                position: relative;
                padding-left: 50%;
                margin-bottom: 8px;
            }

            td::before {
                position: absolute;
                left: 10px;
                top: 8px;
                font-weight: bold;
                color: #2c5364;
            }

            td:nth-of-type(1)::before { content: "ID"; }
            td:nth-of-type(2)::before { content: "Name"; }
            td:nth-of-type(3)::before { content: "Phone"; }
            td:nth-of-type(4)::before { content: "Specialization"; }
            td:nth-of-type(5)::before { content: "Update"; }
            td:nth-of-type(6)::before { content: "Delete"; }
        }

    </style>
</head>
<body>

<h1>Doctors Management</h1>

<button onclick="window.location.href='index.html'">Home</button>
<button onclick="showForm()">Add Doctor</button>

<div id="doctorFormDiv" style="display:none;">
    <h3 id="formTitle">Add Doctor</h3>

    <form id="doctorForm">
        <label>Name:</label><br>
        <input type="text" id="doctorName" required><br><br>

        <label>Phone:</label><br>
        <input type="text" id="doctorPhone" required><br><br>

        <label>Specialization:</label><br>
        <input type="text" id="doctorSpecialization" required><br><br>

        <button type="submit" id="submitBtn">Save</button>
        <button type="button" onclick="hideForm()">Cancel</button>
    </form>
</div>

<h2>All Doctors</h2>

<table id="doctorsTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Specialization</th>
        <th>Update</th>
        <th>Delete</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="js/doctors.js"></script>

</body>
</html>
